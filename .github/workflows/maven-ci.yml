name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # --- BÀI 3 & BÀI 4: Chỉ chạy Unit Test bình thường ---
      - name: Build and Test Bai03
        working-directory: ./Bai03
        run: mvn clean test

      - name: Build and Test Bai04
        working-directory: ./Bai04
        run: mvn clean test

