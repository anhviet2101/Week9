name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # --- BÀI 3 & BÀI 4: Chỉ chạy Unit Test bình thường ---
      - name: Build and Test Bai03
        working-directory: ./Bai03
        run: mvn clean test

      - name: Build and Test Bai04
        working-directory: ./Bai04
        run: mvn clean test

      # --- BÀI 5: Chạy Test + Check Coverage (JaCoCo) ---
      - name: Build, Test and Verify Coverage Bai05
        working-directory: ./Bai05
        run: mvn clean verify

      # Chỉ upload file báo cáo HTML của Bài 5
      - name: Upload JaCoCo Coverage Report (Bai05)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report-${{ matrix.os }}
          path: Bai05/target/site/jacoco/
          retention-days: 7

      - name: Bước 3 - Chạy Test và Soi lỗi
        run: mvn clean verify
        continue-on-error: true

      - name: Bước 4 - Bot Checkstyle (Inline Feedback)
        if: runner.os == 'Linux'
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          checkstyle_config: google_checks.xml